            <section class="login-section">
                <h1 class="login-title">Зарегистрируйтесь</h1>
                <p class="login-subtitle">Создайте аккаунт для доступа к системе</p>

                <form class="login-form" onsubmit="handleRegister(event)">
                    <div class="input-group">
                        <input type="text" id="name" class="login-input" placeholder="Введите имя" required>
                    </div>

                    <div class="input-group">
                        <input type="text" id="phone-number" class="login-input"
                            placeholder="Введите номер +375 (XX) XXX-XX-XX" required>
                    </div>

                    <div class="input-group">
                        <input type="email" id="email" class="login-input" placeholder="Введите email" required>
                    </div>

                    <div class="input-group">
                        <input type="password" id="password" class="login-input" placeholder="Введите пароль (мин. 6 символов)" required>
                    </div>

                    <div class="input-group">
                        <input type="password" id="confirm_password" class="login-input"
                            placeholder="Подтвердите пароль" required>
                    </div>

                    <div id="errorMessage" style="color: red; margin-bottom: 10px; display: none;"></div>
                    <div id="successMessage" style="color: green; margin-bottom: 10px; display: none;"></div>

                    <button type="submit" class="login-button">Зарегистрироваться</button>

                </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';

        async function handleRegister(event) {
            event.preventDefault();

            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone-number').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Валидация
            if (!name || !phone || !email || !password || !confirmPassword) {
                errorDiv.textContent = 'Пожалуйста, заполните все поля';
                errorDiv.style.display = 'block';
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                errorDiv.textContent = 'Введите корректный email';
                errorDiv.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = 'Пароль должен содержать минимум 6 символов';
                errorDiv.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorDiv.textContent = 'Пароли не совпадают';
                errorDiv.style.display = 'block';
                return;
            }

            if (phone.replace(/\D/g, '').length < 9) {
                errorDiv.textContent = 'Введите корректный номер телефона';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name,
                        password,
                        email,
                        phone
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Ошибка регистрации');
                }

                successDiv.textContent = 'Регистрация прошла успешно! Перенаправляем на страницу входа...';
                successDiv.style.display = 'block';

                // Очищаем поля
                document.getElementById('name').value = '';
                document.getElementById('phone-number').value = '';
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
                document.getElementById('confirm_password').value = '';

                // Перенаправляем на страницу входа через 2 секунды
                setTimeout(() => {
                    window.location.href = 'Authorization.html';
                }, 2000);

            } catch (error) {
                console.error('Registration error:', error);
                errorDiv.textContent = error.message || 'Ошибка при регистрации';
                errorDiv.style.display = 'block';
            }
        }
    </script>
