<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Поднимаемся на уровень выше из папки html, затем идем в css -->
    <link rel="stylesheet" href="../css/style_authorization.css">
    <title>REUTKUPI | Авторизация</title>
</head>

<body>
    <div class="background">
        <div class="substrate">
            <div class="logo">
                <!-- Поднимаемся на уровень выше из папки html, затем идем в images -->
                <img class="logo-img" src="../images/logo1.png" alt="Logo">
            </div>

            <section class="login-section">
                <h1 class="login-title">Войдите по имени и паролю</h1>
                <p class="login-subtitle">Только для зарегистрированных пользователей</p>

                <form class="login-form" id="loginForm">
                    <div class="input-group">
                        <input type="text" id="login" name="login" class="login-input"
                            placeholder="Введите имя или email" required autocomplete="username">
                    </div>

                    <div class="input-group">
                        <input type="password" id="password" name="password" class="login-input"
                            placeholder="Введите пароль" required autocomplete="current-password">
                    </div>

                    <div id="errorMessage" class="error-message"></div>
                    <div id="successMessage" class="success-message"></div>

                    <button type="submit" class="login-button" id="submitBtn">
                        <span class="button-text">Войти</span>
                        <span class="loading-spinner" style="display: none;"></span>
                    </button>
                </form>

                <div class="register-link">
                    <!-- Registration.html в той же папке html -->
                    <a href="../html/Registration.html" class="register-link-text">Зарегистрироваться</a>
                </div>
            </section>
        </div>
    </div>

    <!-- Поднимаемся на уровень выше из папки html, затем идем в src/ts -->
    <script type="module" src="../src/ts/auth.ts"></script>
</body>

</html>
