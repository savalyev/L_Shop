<!-- Модальное окно корзины -->
<div class="modal-overlay" id="cartModal" style="display: none;">
    <div class="modal-box">
        <button class="modal-close" id="closeCartBtn">✖</button>
        <h2 data-i18n="your_cart">Ваша корзина</h2>
        <div id="cartItems" class="cart-items-container" data-i18n="loading">Загрузка...</div>
        <div class="cart-footer">
            <div class="cart-total" id="cartTotal" data-i18n="total">Итого: 0 BYN</div>
            <button class="checkout-btn" id="checkoutBtn" data-i18n="checkout">Оформить доставку</button>
        </div>
    </div>
</div>
