<header class="shop-header">
    <div class="container header-inner">
        <a href="#" id="goHome" class="shop-logo" data-i18n="REUTKUPI">REUTKUPI</a>
        <div class="header-actions">
            <button class="action-btn" id="goBackBtn" data-i18n="back">Назад</button>
        </div>
    </div>
</header><div class="container" style="max-width: 600px; margin-top: 40px; margin-bottom: 40px;">
    <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <h2 style="margin-top: 0; margin-bottom: 20px; font-size: 24px;" data-i18n="checkout">Оформление доставки</h2>        <div id="deliveryError" style="display: none; background: #ffebee; color: #ff4757; padding: 10px; border-radius: 6px; margin-bottom: 15px;"></div>
        <div id="deliverySuccess" style="display: none; background: #e8f5e9; color: #2ed573; padding: 10px; border-radius: 6px; margin-bottom: 15px;" data-i18n="order_success">Заказ успешно оформлен!</div>        <form id="deliveryForm" data-delivery style="display: flex; flex-direction: column; gap: 15px;">            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label for="country" style="font-weight: 500; font-size: 14px;" data-i18n="country">Страна</label>
                <input type="text" id="country" required placeholder="Например: Belarus" style="padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;" data-i18n-placeholder="country_placeholder">
            </div>            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label for="town" style="font-weight: 500; font-size: 14px;" data-i18n="town">Город</label>
                <input type="text" id="town" required placeholder="Например: Minsk" style="padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;" data-i18n-placeholder="town_placeholder">
            </div>            <div style="display: flex; gap: 15px;">
                <div style="display: flex; flex-direction: column; gap: 5px; flex: 2;">
                    <label for="street" style="font-weight: 500; font-size: 14px;" data-i18n="street">Улица</label>
                    <input type="text" id="street" required placeholder="Например: Ленина" style="padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;" data-i18n-placeholder="street_placeholder">
                </div>                <div style="display: flex; flex-direction: column; gap: 5px; flex: 1;">
                    <label for="houseNumber" style="font-weight: 500; font-size: 14px;" data-i18n="house_number">Дом/Квартира</label>
                    <input type="text" id="houseNumber" required placeholder="12-4" style="padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;" data-i18n-placeholder="house_number_placeholder">
                </div>
            </div>            <hr style="border: none; border-top: 1px solid #eee; margin: 10px 0;">            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label for="phone" style="font-weight: 500; font-size: 14px;" data-i18n="phone">Телефон для связи</label>
                <input type="text" id="phone" required placeholder="+375 XX XXX-XX-XX" style="padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;" data-i18n-placeholder="phone_placeholder">
            </div>            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label for="payment" style="font-weight: 500; font-size: 14px;" data-i18n="payment_method">Способ оплаты</label>
                <select id="payment" disabled style="padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background-color: #f5f5f5;">
                    <option value="cash" selected data-i18n="cash">Наличными курьеру (онлайн оплата временно недоступна)</option>
                </select>
            </div>            <button type="submit" style="margin-top: 10px; padding: 12px; background: #ff4757; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer;" data-i18n="confirm_order">
                Подтвердить заказ
            </button>
        </form>
    </div>
</div>
