<div class="auth-page">
    <div class="auth-card" style="max-width: 500px;">
        <a href="#" class="auth-logo" data-i18n="REUTKUPI">REUTKUPI</a>
        <h1 class="auth-title" data-i18n="register_title">Создать аккаунт</h1>
        <p class="auth-subtitle" data-i18n="register_subtitle">Присоединяйтесь к нам для удобных покупок</p>        <div id="errorMessage" class="message msg-error" style="display: none;"></div>
        <div id="successMessage" class="message msg-success" style="display: none;"></div>        <form class="auth-form" id="registerForm" data-registration>
            <div class="auth-input-wrapper">
                <label for="name" data-i18n="name">Имя</label>
                <input type="text" id="name" class="auth-input" placeholder="Как к вам обращаться?" required data-i18n-placeholder="name_placeholder">
            </div>            <div class="reg-grid">
                <div class="auth-input-wrapper">
                    <label for="email" data-i18n="email">Email</label>
                    <input type="email" id="email" class="auth-input" placeholder="example@mail.com" required data-i18n-placeholder="email_placeholder">
                </div>
                <div class="auth-input-wrapper">
                    <label for="phone-number" data-i18n="phone_number">Телефон</label>
                    <input type="text" id="phone-number" class="auth-input" placeholder="+375 XX XXX-XX-XX" required data-i18n-placeholder="phone_placeholder">
                </div>
            </div>            <div class="reg-grid">
                <div class="auth-input-wrapper">
                    <label for="password" data-i18n="password">Пароль</label>
                    <input type="password" id="password" class="auth-input" placeholder="Мин. 6 символов" required data-i18n-placeholder="password_placeholder">
                </div>
                <div class="auth-input-wrapper">
                    <label for="confirmpassword" data-i18n="confirm_password">Повторите пароль</label>
                    <input type="password" id="confirmpassword" class="auth-input" placeholder="Подтвердите пароль" required data-i18n-placeholder="confirm_password_placeholder">
                </div>
            </div>
<button type="submit" class="auth-btn" data-i18n="register">Зарегистрироваться</button>
        </form>        <div class="auth-footer">
            <span data-i18n="already_have_account">Уже есть аккаунт?</span> <a href="#" id="goToLogin" class="auth-link" data-i18n="login">Войти</a>
        </div>
    </div>
</div>
